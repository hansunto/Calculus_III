<div class="para logical">
<div class="para">If a 2D curve has an arc length parameterization given by <span class="process-math">\(x=f(s)\)</span> and <span class="process-math">\(y=g(s)\text{,}\)</span> then the curvature <span class="process-math">\(\kappa\)</span> at a point <span class="process-math">\(P(x,y)\)</span> is given geometrically by:</div>
<div class="displaymath process-math">
\begin{equation*}
\kappa=\left|\frac{d\theta}{ds}\right|
\end{equation*}
</div>
